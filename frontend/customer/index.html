<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món - Việt Order</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 0; background: #f8f9fa; color: #333; margin: 0; }
        .header { text-align: center; color: white; background: #28a745; padding: 25px 20px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .item { 
            background: white; padding: 12px; margin: 0 15px 15px 15px; border-radius: 15px; 
            display: flex; align-items: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .item:active { transform: scale(0.98); }
        
        .item-img { 
            width: 80px; height: 80px; border-radius: 12px; 
            object-fit: cover; margin-right: 15px; background: #eee;
        }

        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-name { font-weight: bold; font-size: 1.1em; color: #2c3e50; }
        .item-price { color: #28a745; font-weight: bold; margin-top: 4px; font-size: 1em; }
        
        .order-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        input[type="number"] { width: 40px; padding: 6px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1em; }
        
        button { 
            background: #28a745; color: white; border: none; padding: 8px 15px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:active { background: #218838; }

        #connection-status { font-size: 0.8em; margin-top: 8px; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">Bàn số: <span id="table-display">...</span></h2>
        <small id="connection-status">● Đang kết nối server...</small>
    </div>
    
    <div id="menu">
        <p style="text-align: center; color: #888;">Đang tải thực đơn...</p>
    </div>

    <script>
        const API_BASE = "https://ungdungorder-1.onrender.com"; 
        const WS_URL = API_BASE.replace("https", "wss");

        // LẤY THÔNG TIN TỪ URL: ?shop=ten_quan&table=5
        const params = new URLSearchParams(window.location.search);
        const tableNo = params.get('table') || "0";
        const shopId = params.get('shop') || "viet_cafe"; // Nếu không có shop, mặc định là viet_cafe
        
        document.getElementById('table-display').innerText = tableNo;

        let socket;
        function connectWS() {
            // Khách hàng kết nối vào luồng WebSocket của đúng quán đó
            socket = new WebSocket(`${WS_URL}/ws/${shopId}`);
            
            socket.onopen = () => {
                document.getElementById('connection-status').innerText = "● Đã kết nối trực tuyến";
                document.getElementById('connection-status').style.color = "#d1ffd6";
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === "menu_update") {
                    loadMenu(); 
                }
            };

            socket.onclose = () => {
                document.getElementById('connection-status').innerText = "○ Mất kết nối, đang thử lại...";
                document.getElementById('connection-status').style.color = "#ffcccc";
                setTimeout(connectWS, 5000);
            };
        }

        async function loadMenu() {
            try {
                // Chỉ lấy menu của đúng quán này
                const res = await fetch(`${API_BASE}/api/products/${shopId}`);
                if (!res.ok) throw new Error("Không lấy được dữ liệu");
                
                const products = await res.json();
                const menuDiv = document.getElementById('menu');
                
                if (products.length === 0) {
                    menuDiv.innerHTML = "<p style='text-align:center; padding: 20px; color: #888;'>Quán chưa đăng món nào. Việt nhắc chủ quán nhé!</p>";
                    return;
                }

                menuDiv.innerHTML = products.map((p, index) => `
                    <div class="item">
                        <img src="${p.image || 'https://via.placeholder.com/100'}" class="item-img" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="item-info">
                            <span class="item-name">${p.name}</span>
                            <span class="item-price">${p.price.toLocaleString()}đ</span>
                        </div>
                        <div class="order-controls">
                            <input type="number" id="qty-${index}" value="1" min="1">
                            <button onclick="order('${p.name}', 'qty-${index}')">Đặt</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('menu').innerHTML = "<p style='text-align:center; color:red; padding: 20px;'>Lỗi kết nối server!</p>";
            }
        }

        async function order(itemName, qtyId) {
            const quantity = document.getElementById(qtyId).value;
            if (quantity < 1) return alert("Số lượng phải ít nhất là 1!");

            const data = {
                table: tableNo,
                item: itemName,
                quantity: parseInt(quantity),
                owner: shopId // Gửi kèm thông tin quán để server biết gửi cho ai
            };

            try {
                const response = await fetch(`${API_BASE}/api/order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.status === "success") {
                    alert(`✅ Đã xong! Món ${itemName} của Bàn ${tableNo} đang được chuẩn bị.`);
                } else {
                    alert('❌ Lỗi đặt món!');
                }
            } catch (error) {
                alert('❌ Lỗi kết nối!');
            }
        }

        connectWS();
        loadMenu();
    </script>
</body>
</html>
