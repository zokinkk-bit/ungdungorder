<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý - Việt Order</title>
    <style>
        :root { --primary-color: #007bff; --danger-color: #dc3545; --success-color: #28a745; --sidebar-bg: #1c1e21; }
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #3a3b3c; }
        .menu { flex: 1; padding: 10px; display: flex; flex-direction: column; }
        .menu-item { padding: 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .menu-item:hover { background: #3a3b3c; }
        .menu-item.active { background: var(--primary-color); }
        .menu-item.danger { color: #ff6b6b; margin-top: auto; border-top: 1px solid #3a3b3c; }
        .content { margin-left: 260px; flex: 1; padding: 30px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .list-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-danger { background: var(--danger-color); color: white; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .product-img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; background: #eee; }
        .product-info { display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <strong id="display-shop-name">...</strong><br>
            <small id="conn-status" style="color: #888;">Đang kết nối...</small>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="switchPage('page-orders', this)">📦 Đơn hàng mới</div>
            <div class="menu-item" onclick="switchPage('page-menu-mgmt', this); loadProductMgmt();">🍴 Quản lý Menu</div>
            <div class="menu-item danger" onclick="handleLogout()">🚪 Đăng xuất</div>
        </div>
    </div>

    <div class="content">
        <div id="page-orders" class="page active">
            <h1>📋 Đơn hàng mới</h1>
            <ul id="order-list"></ul>
        </div>
        
        <div id="page-menu-mgmt" class="page">
            <h1>🍴 Quản lý thực đơn</h1>
            <div class="card">
                <h3>Thêm món mới</h3>
                <input type="text" id="p-name" placeholder="Tên món">
                <input type="number" id="p-price" placeholder="Giá">
                <input type="file" id="p-image-file" accept="image/*">
                <button class="btn btn-success" onclick="addProduct()">Lưu vào Menu</button>
            </div>
            <div class="card">
                <h3>Danh sách món hiện có</h3>
                <ul id="product-list-admin"></ul>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://ungdungorder-1.onrender.com";
        const WS_URL = API_BASE.replace("https", "wss");

        // Lấy thông tin quán từ localStorage
        const currentOwner = localStorage.getItem('owner_id');
        if (!currentOwner) { window.location.href = "login.html"; }
        document.getElementById('display-shop-name').innerText = currentOwner.toUpperCase();

        let socket;
        let displayedOrders = new Set();

        window.onload = () => { 
            loadPendingOrders(); 
            connectWS();
        };

        function connectWS() {
            // Nâng cấp: WebSocket giờ đây kết nối theo ID quán
            socket = new WebSocket(`${WS_URL}/ws/${currentOwner}`);
            socket.onopen = () => {
                document.getElementById('conn-status').innerText = "● Đang trực tuyến";
                document.getElementById('conn-status').style.color = "#2ecc71";
            };
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === "new_order") {
                    addOrderToUI(data);
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
                }
            };
            socket.onclose = () => {
                document.getElementById('conn-status').innerText = "○ Mất kết nối...";
                document.getElementById('conn-status').style.color = "#e74c3c";
                setTimeout(connectWS, 5000);
            };
        }

        async function loadPendingOrders() {
            const res = await fetch(`${API_BASE}/api/admin/pending-orders/${currentOwner}`);
            if (res.ok) {
                const orders = await res.json();
                orders.forEach(order => addOrderToUI(order));
            }
        }

        function addOrderToUI(data) {
            if (displayedOrders.has(data.id)) return;
            const list = document.getElementById('order-list');
            const li = document.createElement('li');
            li.className = 'list-item';
            li.id = `order-${data.id}`;
            li.innerHTML = `
                <div><strong>Bàn ${data.table}</strong>: ${data.item} (x${data.quantity})</div>
                <button class="btn btn-success" onclick="markDone(${data.id})">Xong</button>
            `;
            list.prepend(li);
            displayedOrders.add(data.id);
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const fileInput = document.getElementById('p-image-file');
            
            if(!name || !price) return alert("Nhập đủ thông tin!");

            let base64Image = "";
            if (fileInput.files.length > 0) {
                base64Image = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }
            
            await fetch(`${API_BASE}/api/admin/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    name, 
                    price: parseInt(price), 
                    image: base64Image,
                    owner: currentOwner // Gửi kèm ID quán
                })
            });
            alert("Đã thêm!");
            loadProductMgmt();
        }

        async function loadProductMgmt() {
            const res = await fetch(`${API_BASE}/api/products/${currentOwner}`);
            const products = await res.json();
            document.getElementById('product-list-admin').innerHTML = products.map(p => `
                <li class="list-item">
                    <div class="product-info">
                        <img src="${p.image || 'https://via.placeholder.com/50'}" class="product-img-preview">
                        <div><strong>${p.name}</strong><br><small>${p.price}đ</small></div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteProduct('${p.name}')">Xóa</button>
                </li>
            `).join('');
        }

        async function deleteProduct(name) {
            await fetch(`${API_BASE}/api/admin/products/${currentOwner}/${encodeURIComponent(name)}`, { method: 'DELETE' });
            loadProductMgmt();
        }

        async function markDone(id) {
            await fetch(`${API_BASE}/api/orders/${id}/complete`, { method: 'POST' });
            document.getElementById(`order-${id}`).remove();
        }

        function handleLogout() {
            localStorage.removeItem('owner_id');
            window.location.href = "login.html";
        }

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
